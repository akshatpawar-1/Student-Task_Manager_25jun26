<!DOCTYPE html>
<html>

<head>
    <title> Student Task Manager </title>

    <style>
        *{
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            margin:0;
            min-height:75vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #e0f2fe, #ccfbf1);
        }

        h1{
            font-size:29px;
            color:#0f172a;
            margin-bottom:20px;
            text-shadow:1px 1px 10px rgba(0,0,0,0.1);
        }

        .fc{
            width:90%;
            max-width:460px; 
            background:white;
            padding:24px;
            border-radius:20px;
            box-shadow:0 15px 35px rgba(0,0,0,0.12);
            transition:0.3s;
        }

        .fc:hover{
            transform:translateY(-4px);
        }

        input[type="text"]{
            width:100%;
            padding:12px;
            border-radius:12px;
            border:1px solid #cbd5e1;
            outline:none;
            font-size:18px;
            margin-bottom:8px;
            text-align:center;
        }

        input[type="text"]:focus{
            border-color:#2563eb;
            box-shadow:0 0 8px rgba(37,99,235,0.3);
        }

        .section{
            margin:8px 0 16px 0;
            padding:10px;
            background:#f8fafc;
            border-radius:12px;
            display:flex;
            flex-direction:column;
            align-items:center;
        }

        label{
            font-size:17px;
            text-align:center;
            color:#1e3a8a;
        }

        select{
            width:60%;
            padding:10px;
            border-radius:12px;
            border:1px solid #cbd5e1;
            outline:none;
            font-size:16px;
            text-align:center;
            background:white;
            cursor:pointer;
            transition:0.3s;
        }

        select:focus{
            border-color:#2563eb;
            box-shadow:0 0 8px rgba(37,99,235,0.3);
        }

        .btn-container {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            width: 100%;
        }

        .btn{
            flex: 1;
            padding:12px;
            border:none;
            border-radius:12px;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
            background:#2563eb;
            color:white;
        }

        .btn:hover{
            background:#1d4ed8;
            transform:scale(1.03);
        }

        #btn-remove {
            background: #dc2626;
        }

        #btn-remove:hover {
            background: #b91c1c;
        }

	#btn-show {
		background:#22c55e;
	}
	
	#btn-show:hover {
            background:#15803d;
        }
	
        #msg{
            margin-top:20px;
            font-size:23px;
            font-weight:bold;
            color:#111827;
            text-align:center;
        }

    </style>
</head>

<body>

    <h1> Student Task Manager </h1>

    <div class="fc">

        <form onsubmit="check(event)">

            <input type="text" id="tn" placeholder="Enter Task Name" required/>

            <div class="section">
                <label>Select Category</label>
                <br/>
                <select id="cat">
                    <option value="study">Study</option>
                    <option value="coding">Coding</option>
                    <option value="personal">Personal</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="btn-container">
                <input type="submit" value="Add" class="btn" />
                <input type="submit" value="Remove" class="btn" id="btn-remove" />
                <input type="submit" value="Show" class="btn" id="btn-show"/>
            </div>

        </form>

    </div>

    <h2 id="msg"></h2>

    <script>
        let tasks=[];

        function check(event)
        {
            event.preventDefault();

            let tname=document.getElementById("tn");
            let category=document.getElementById("cat");
            let action=document.activeElement.value;
            let msg=document.getElementById("msg");

            if(action==="Add")
            {
                let s=tname.value+" ("+category.value+")";
                tasks.push(s);
		
            }

            else if(action==="Remove")
            {
                let n=prompt("Enter Task to be Removed");

                if(n!=="")
                {
                    let pos=tasks.indexOf(n);

                    if(pos===-1)
                        alert(n+" not found");
                    else
                        tasks.splice(pos,1);
                }
            }

            else if(action==="Show")
            {
                let data="";

                for(let i=0;i<tasks.length;i++)
                {
                    data+=(i+1)+". "+tasks[i]+"<br/>";
                }

                msg.innerHTML=data;
            }
        }
    </script>

</body>
</html>
